name: ase-extxyz

on:
  push:
    branches: [ master, meson ]
    tags:
      - "ase-extxyz-v*"
  pull_request:
    branches: [ master, meson ]

jobs:
  test:
    name: Test ase-extxyz on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libpcre2-dev

      - name: Install both packages from the source tree
        run: |
          python -m pip install --upgrade pip
          # extxyz from the in-tree source. Its discover_version output is
          # 0.2.2.devN+g<SHA> until v0.3.0 is tagged, which is < 0.3.0 by
          # PEP 440 ordering. ase-extxyz's `extxyz>=0.3.0` would reject
          # that and fall back to PyPI, so install ase-extxyz with
          # --no-deps and add ase + pytest separately.
          python -m pip install ./
          python -m pip install ase pytest
          python -m pip install --no-deps ./python/ase-extxyz

      - name: Run ase-extxyz test suite
        run: pytest python/ase-extxyz/tests -v

  publish:
    name: Build sdist + wheel and publish to PyPI
    needs: test
    if: startsWith(github.ref, 'refs/tags/ase-extxyz-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build python/ase-extxyz/ --sdist --wheel
          ls -la python/ase-extxyz/dist

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: python/ase-extxyz/dist/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/ase-extxyz/dist/
          password: ${{ secrets.TWINE_PASSWORD }}
          skip-existing: true
